name: Generate SDK Release Notes
description: Generates Discord-formatted release notes from a git diff using GaaS

inputs:
  diff_file:
    description: Path to a file containing the raw git diff to generate release notes from
    required: true

outputs:
  release_notes:
    description: Discord-formatted release notes generated from the diff
    value: ${{ steps.call.outputs.release_notes }}

runs:
  using: composite
  steps:
    - name: Call GaaS via edge-app
      id: call
      shell: bash
      env:
        GAAS_URL: https://private-kyc-api.platform.molops.net/internal/gaas/mex/sdk_release_notes_generator
        OIDC_AUDIENCE: https://private-kyc-api.platform.molops.net/internal/gaas/mex
      run: |
        TOKEN=$(curl -fsSL \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}" \
          | jq -r .value)

        if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
          echo "::error::Failed to obtain GitHub OIDC token"
          exit 1
        fi

        BODY=$(jq -n --rawfile diff "${{ inputs.diff_file }}" '{"diff": $diff}')

        RESPONSE=$(curl -sS -w "\n%{http_code}" \
          -X POST \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          --data "$BODY" \
          "$GAAS_URL")

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)

        if [ "$HTTP_CODE" != "200" ]; then
          echo "::error::GaaS request failed (HTTP $HTTP_CODE): $RESPONSE_BODY"
          exit 1
        fi

        NOTES=$(echo "$RESPONSE_BODY" | jq -r '.summary')

        if [ -z "$NOTES" ] || [ "$NOTES" = "null" ]; then
          echo "::error::Response missing summary field: $RESPONSE_BODY"
          exit 1
        fi

        {
          echo "release_notes<<EOF"
          echo "$NOTES"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
